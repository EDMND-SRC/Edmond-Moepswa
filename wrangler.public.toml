"$schema" = "./node_modules/wrangler/config-schema.json"
name = "edmond-moepswa"
main = ".open-next/public/worker.js"
workers_dev = true
compatibility_date = "2026-04-28"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
base_dir = ".open-next/public"
find_additional_modules = true

[[rules]]
type = "ESModule"
globs = [
  "cloudflare/*.js",
  "cloudflare/*.mjs",
  "middleware/*.mjs",
  "server-functions/*/*.mjs",
  ".build/durable-objects/*.js",
]

[[rules]]
type = "CommonJS"
globs = [
  "server-functions/*/*.cjs",
  ".build/*.cjs",
]

[assets]
directory = ".open-next/public/assets"
binding = "ASSETS"

[images]
binding = "IMAGES"

[vars]
PAYLOAD_DB_POOL_MAX = "1"
PUBLIC_WORKER_NAME = "edmond-moepswa"
PAYLOAD_WORKER_NAME = "edmond-moepswa-payload"
PAYLOAD_WORKER_VERSION_ID = ""
WORKERS_DEV_SUFFIX = "edmnd-src.workers.dev"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "edmond-moepswa"

[[services]]
binding = "PAYLOAD_WORKER"
service = "edmond-moepswa-payload"

[env.staging]
name = "edmond-moepswa-staging"

[env.staging.images]
binding = "IMAGES"

[env.staging.vars]
PAYLOAD_DB_POOL_MAX = "1"
PUBLIC_WORKER_NAME = "edmond-moepswa-staging"
PAYLOAD_WORKER_NAME = "edmond-moepswa-payload-staging"
PAYLOAD_WORKER_VERSION_ID = ""
WORKERS_DEV_SUFFIX = "edmnd-src.workers.dev"

[[env.staging.services]]
binding = "WORKER_SELF_REFERENCE"
service = "edmond-moepswa-staging"

[[env.staging.services]]
binding = "PAYLOAD_WORKER"
service = "edmond-moepswa-payload-staging"
